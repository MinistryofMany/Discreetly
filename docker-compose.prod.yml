# Production-style stack for Discreetly. Separate from the dev docker-compose.yml
# (which publishes Postgres 5432 + Redis 6379 for local development) - this file
# keeps Postgres/Redis internal-only and publishes just web + api.
#
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
#
# Reach a Minister running on the host via host.docker.internal:3000 (mapped to
# the host gateway on the api/web services). See .env.prod.example.

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - prod_pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    networks:
      - internal
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: apply migrations with `prisma migrate deploy` before the API starts.
  # Reuses the api image (it ships the prisma CLI + schema in the workspace).
  migrate:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    image: discreetly-api
    command: ['pnpm', '--filter', '@discreetly/db', 'exec', 'prisma', 'migrate', 'deploy']
    environment:
      DATABASE_URL: ${DATABASE_URL}
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    image: discreetly-api
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      MINISTER_ISSUER: ${MINISTER_ISSUER}
      MINISTER_JWKS_URL: ${MINISTER_JWKS_URL}
      MINISTER_VC_ISSUER: ${MINISTER_VC_ISSUER}
      MINISTER_CLIENT_ID: ${MINISTER_CLIENT_ID}
      API_PORT: ${API_PORT:-3002}
      ALLOWED_WS_ORIGINS: ${ALLOWED_WS_ORIGINS}
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    ports:
      - '${API_HOST_PORT:-3002}:3002'
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      # Readiness probe - 200 once the HTTP server + Postgres + Redis are reachable.
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(\"http://127.0.0.1:3002/ready\").then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_API_WS_URL: ${NEXT_PUBLIC_API_WS_URL}
    image: discreetly-web
    environment:
      MINISTER_ISSUER: ${MINISTER_ISSUER}
      MINISTER_CLIENT_ID: ${MINISTER_CLIENT_ID}
      MINISTER_CLIENT_SECRET: ${MINISTER_CLIENT_SECRET}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${AUTH_URL}
      AUTH_TRUST_HOST: ${AUTH_TRUST_HOST:-true}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_API_WS_URL: ${NEXT_PUBLIC_API_WS_URL}
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    ports:
      - '${WEB_HOST_PORT:-3001}:3001'
    networks:
      - internal
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(\"http://127.0.0.1:3001/\").then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

networks:
  internal:
    driver: bridge

volumes:
  prod_pgdata:

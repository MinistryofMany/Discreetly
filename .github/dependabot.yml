version: 2
updates:
  # npm/pnpm workspace at the repo root (pnpm-lock.yaml). Dependabot resolves the
  # whole pnpm workspace (apps/*, services/*, packages/*) from the root manifest.
  #
  # Scoped to "/" only, so the standalone npm project under
  # experiments/zk-nonauthorship-moderation/prototype/ is never picked up for
  # version-update PRs. That prototype is parked / not wired into the app, and its
  # lockfile is gitignored (see the prototype's .gitignore) so it also stays out
  # of the repo dependency graph and raises no Dependabot security alerts.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"

  # Keep the CI Actions current.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
